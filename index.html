<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Glassflow Board – スマートなタスク管理</title>
  <meta name="description" content="Glassmorphismデザインの美しいカンバンボード。Google認証でチーム共有も可能。">
  <!-- Google Fonts: Outfit -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <!-- CSS Link -->
  <link rel="stylesheet" href="style.css">
  <!-- PWA Settings -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#15102a">
  <link rel="apple-touch-icon" href="icon.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <!-- Lucide Icons CDN -->
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
  <!-- Ambient background glowing orbs -->
  <div class="orbs-container">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>

  <div class="app-container">
    <!-- Header -->
    <header class="app-header">
      <div class="header-main">
        <div class="logo-area">
          <div class="logo-icon">
            <i data-lucide="trello"></i>
          </div>
          <div>
            <h1>Glassflow Board</h1>
            <p class="subtitle">タスクを美しく、スマートに管理する</p>
          </div>
        </div>
        <div class="header-meta">
          <div class="date-badge">
            <i data-lucide="calendar"></i>
            <span id="current-date">2026年7月14日</span>
          </div>
          <!-- Auth Area -->
          <div class="auth-area" id="auth-area">
            <div id="auth-signed-out" class="auth-signed-out">
              <button id="btn-google-signin" class="btn btn-google">
                <svg width="18" height="18" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                  <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                  <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                  <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                  <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                </svg>
                Googleでログイン
              </button>
            </div>
            <div id="auth-signed-in" class="auth-signed-in" style="display:none;">
              <div class="user-info">
                <img id="user-avatar" src="" alt="avatar" class="user-avatar">
                <span id="user-name" class="user-name"></span>
              </div>
              <button id="btn-signout" class="btn btn-secondary btn-sm">
                <i data-lucide="log-out"></i>
                サインアウト
              </button>
            </div>
          </div>
        </div>
      </div>

      <!-- Stats Panel -->
      <div class="stats-panel">
        <div class="stat-card">
          <span class="stat-label">すべてのタスク</span>
          <span class="stat-value" id="stat-total">0</span>
        </div>
        <div class="stat-card">
          <span class="stat-label">進行中</span>
          <span class="stat-value" id="stat-progress">0</span>
        </div>
        <div class="stat-card">
          <span class="stat-label">完了</span>
          <span class="stat-value" id="stat-done">0</span>
        </div>
        <div class="stat-card">
          <span class="stat-label">達成率</span>
          <span class="stat-value" id="stat-rate">0%</span>
        </div>
      </div>
    </header>

    <!-- Toolbar / Controls -->
    <section class="toolbar-section">
      <div class="search-bar">
        <i data-lucide="search" class="search-icon"></i>
        <input type="text" id="search-input" placeholder="タスクを検索...">
      </div>
      <div class="toolbar-actions">
        <div class="filter-group">
          <label for="priority-filter"><i data-lucide="sliders-horizontal"></i> 優先度:</label>
          <select id="priority-filter">
            <option value="all">すべて</option>
            <option value="high">高 (High)</option>
            <option value="medium">中 (Medium)</option>
            <option value="low">低 (Low)</option>
          </select>
        </div>
        <div class="filter-group">
          <label for="category-filter"><i data-lucide="tag"></i> カテゴリ:</label>
          <select id="category-filter">
            <option value="all">すべて</option>
            <option value="仕事">仕事</option>
            <option value="プライベート">プライベート</option>
            <option value="勉強">勉強</option>
            <option value="その他">その他</option>
          </select>
        </div>
        <button id="btn-new-task" class="btn btn-primary">
          <i data-lucide="plus"></i>
          新規タスク
        </button>
      </div>
    </section>

    <!-- Kanban Board -->
    <main class="board-container">
      <!-- ToDo Column -->
      <div class="board-column" data-status="todo" id="col-todo">
        <div class="column-header">
          <div class="column-title-wrapper">
            <span class="column-dot dot-todo"></span>
            <h2>未着手</h2>
            <span class="task-count" id="count-todo">0</span>
          </div>
        </div>
        <div class="column-body" id="body-todo" ondragover="allowDrop(event)" ondrop="drop(event)">
          <!-- Dynamic Task Cards Go Here -->
        </div>
      </div>

      <!-- In Progress Column -->
      <div class="board-column" data-status="progress" id="col-progress">
        <div class="column-header">
          <div class="column-title-wrapper">
            <span class="column-dot dot-progress"></span>
            <h2>進行中</h2>
            <span class="task-count" id="count-progress">0</span>
          </div>
        </div>
        <div class="column-body" id="body-progress" ondragover="allowDrop(event)" ondrop="drop(event)">
          <!-- Dynamic Task Cards Go Here -->
        </div>
      </div>

      <!-- Done Column -->
      <div class="board-column" data-status="done" id="col-done">
        <div class="column-header">
          <div class="column-title-wrapper">
            <span class="column-dot dot-done"></span>
            <h2>完了</h2>
            <span class="task-count" id="count-done">0</span>
          </div>
        </div>
        <div class="column-body" id="body-done" ondragover="allowDrop(event)" ondrop="drop(event)">
          <!-- Dynamic Task Cards Go Here -->
        </div>
      </div>
    </main>
  </div>

  <!-- Task Modal (Add/Edit) -->
  <div class="modal-overlay" id="task-modal">
    <div class="modal-content glass-card">
      <div class="modal-header">
        <h3 id="modal-title">新規タスクの追加</h3>
        <button class="btn-close" id="modal-close"><i data-lucide="x"></i></button>
      </div>
      <form id="task-form">
        <input type="hidden" id="task-id">

        <!-- タイトル -->
        <div class="form-group">
          <label for="task-title-input">タイトル <span class="required">*</span></label>
          <input type="text" id="task-title-input" required placeholder="タスクのタイトルを入力してください">
        </div>

        <!-- 詳細説明 -->
        <div class="form-group">
          <label for="task-desc-input">詳細説明</label>
          <textarea id="task-desc-input" rows="3" placeholder="タスクの詳細を入力してください"></textarea>
        </div>

        <!-- 優先度 & 期限 -->
        <div class="form-row">
          <div class="form-group">
            <label for="task-priority-input">優先度</label>
            <select id="task-priority-input">
              <option value="low">低 (Low)</option>
              <option value="medium" selected>中 (Medium)</option>
              <option value="high">高 (High)</option>
            </select>
          </div>
          <div class="form-group">
            <label for="task-date-input">期限</label>
            <input type="date" id="task-date-input">
          </div>
        </div>

        <!-- カテゴリ & 担当者 -->
        <div class="form-row">
          <div class="form-group">
            <label for="task-category-input">カテゴリ</label>
            <select id="task-category-input">
              <option value="仕事">仕事</option>
              <option value="プライベート">プライベート</option>
              <option value="勉強">勉強</option>
              <option value="その他">その他</option>
            </select>
          </div>
          <div class="form-group">
            <label for="task-assignee-input">担当者</label>
            <input type="text" id="task-assignee-input" placeholder="担当者名（任意）">
          </div>
        </div>

        <!-- タグ -->
        <div class="form-group">
          <label for="task-tags-input">タグ <span class="label-hint">（カンマ区切りで複数入力可）</span></label>
          <input type="text" id="task-tags-input" placeholder="例: urgent, frontend, review">
        </div>

        <div class="modal-actions">
          <button type="button" class="btn btn-secondary" id="btn-cancel">キャンセル</button>
          <button type="submit" class="btn btn-primary" id="btn-save">保存する</button>
        </div>
      </form>
    </div>
  </div>

  <!-- JavaScript: .env loader (must be before firebase-config.js) -->
  <script src="loadEnv.js"></script>
  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <!-- Firebase config (reads from window.env) -->
  <script src="firebase-config.js"></script>
  <!-- App logic -->
  <script src="app.js"></script>
</body>
</html>
